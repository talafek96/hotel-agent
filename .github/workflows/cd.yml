name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # Gate: only proceed if CI checks passed (they run in parallel via ci.yml)
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run full test suite
        run: uv run pytest --tb=short

      - name: Start server and test web UI
        run: |
          cp config.example.yaml config.yaml
          uv run hotel-agent serve --port 8470 --host 127.0.0.1 &
          sleep 5

          echo "Testing all pages..."
          FAIL=0
          for path in /setup / /hotels /bookings /snapshots /alerts /trends /import /scrape /scrapes /check /scheduler /config; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8470${path}")
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ]; then
              echo "FAIL: $path -> $STATUS"
              FAIL=1
            else
              echo "OK: $path -> $STATUS"
            fi
          done

          # Complete setup and verify dashboard
          curl -s -X POST http://127.0.0.1:8470/setup -d "step=6" -o /dev/null
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8470/)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: dashboard after setup -> $STATUS"
            FAIL=1
          else
            echo "OK: dashboard after setup -> $STATUS"
          fi

          kill %1 2>/dev/null || true
          exit $FAIL

  tag:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute and push version tag
        run: |
          TODAY=$(date -u +%Y.%m.%d)

          # Find existing tags for today: v2026.03.21, v2026.03.21-1, v2026.03.21-2, ...
          EXISTING=$(git tag -l "v${TODAY}" "v${TODAY}-*" | sort -V)

          if [ -z "$EXISTING" ]; then
            TAG="v${TODAY}"
          else
            # Find the highest patch number
            LAST=$(echo "$EXISTING" | tail -1)
            if [ "$LAST" = "v${TODAY}" ]; then
              TAG="v${TODAY}-1"
            else
              N=$(echo "$LAST" | sed "s/v${TODAY}-//")
              TAG="v${TODAY}-$((N + 1))"
            fi
          fi

          echo "Tagging: $TAG"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tag $TAG pushed — release workflow will build all platforms."
