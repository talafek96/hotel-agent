name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  tag-and-release:
    # Only run if CI succeeded
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute and push version tag
        id: tag
        run: |
          TODAY=$(date -u +%Y.%m.%d)

          # Find existing tags for today: v2026.03.21, v2026.03.21-1, v2026.03.21-2, ...
          EXISTING=$(git tag -l "v${TODAY}" "v${TODAY}-*" | sort -V)

          if [ -z "$EXISTING" ]; then
            TAG="v${TODAY}"
          else
            # Find the highest patch number
            LAST=$(echo "$EXISTING" | tail -1)
            if [ "$LAST" = "v${TODAY}" ]; then
              TAG="v${TODAY}-1"
            else
              N=$(echo "$LAST" | sed "s/v${TODAY}-//")
              TAG="v${TODAY}-$((N + 1))"
            fi
          fi

          echo "Tagging: $TAG"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Trigger release build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml --ref "${{ steps.tag.outputs.tag }}"
