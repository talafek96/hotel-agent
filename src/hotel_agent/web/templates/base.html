<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — Hotel Tracker</title>
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9; color: #1e293b; line-height: 1.5; display: flex; min-height: 100vh;
        }
        a { color: #3b82f6; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px; background: #1e293b; color: #cbd5e1; display: flex;
            flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0;
            overflow-y: auto; z-index: 100;
        }
        .sidebar-brand {
            padding: 1.5rem 1.25rem; font-size: 1.25rem; font-weight: 700;
            color: #fff; border-bottom: 1px solid #334155; letter-spacing: .02em;
        }
        .sidebar-nav { list-style: none; padding: .5rem 0; flex: 1; }
        .sidebar-nav li a {
            display: flex; align-items: center; gap: .625rem;
            padding: .625rem 1.25rem; color: #94a3b8; font-size: .875rem;
            transition: background .15s, color .15s;
        }
        .sidebar-nav li a:hover,
        .sidebar-nav li a.active { background: #334155; color: #fff; text-decoration: none; }
        .sidebar-nav li a .icon { width: 1.125rem; text-align: center; flex-shrink: 0; }

        /* ── Main content ── */
        .main { margin-left: 240px; flex: 1; min-height: 100vh; }
        .topbar {
            background: #fff; border-bottom: 1px solid #e2e8f0; padding: .875rem 2rem;
            display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50;
        }
        .topbar h1 { font-size: 1.125rem; font-weight: 600; }
        .content { padding: 2rem; max-width: 1400px; }

        /* ── Cards ── */
        .card {
            background: #fff; border-radius: .5rem; box-shadow: 0 1px 3px rgba(0,0,0,.08);
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .card h2, .card h3 { margin-bottom: 1rem; }

        /* ── Stats grid ── */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: #fff; border-radius: .5rem; box-shadow: 0 1px 3px rgba(0,0,0,.08);
            padding: 1.25rem 1.5rem;
        }
        .stat-card .stat-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: #64748b; margin-bottom: .25rem; }
        .stat-card .stat-number { font-size: 1.75rem; font-weight: 700; color: #1e293b; }
        .stat-card .stat-sub { font-size: .8125rem; color: #94a3b8; margin-top: .25rem; }

        /* ── Badges ── */
        .badge {
            display: inline-block; font-size: .7rem; font-weight: 600; padding: .2em .55em;
            border-radius: 9999px; text-transform: uppercase; letter-spacing: .04em; vertical-align: middle;
        }
        .badge-green  { background: #dcfce7; color: #166534; }
        .badge-yellow { background: #fef9c3; color: #854d0e; }
        .badge-red    { background: #fee2e2; color: #991b1b; }
        .badge-blue   { background: #dbeafe; color: #1e40af; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex; align-items: center; gap: .375rem;
            padding: .5rem 1rem; font-size: .875rem; font-weight: 500; border: none;
            border-radius: .375rem; cursor: pointer; transition: background .15s, opacity .15s;
            line-height: 1.4;
        }
        .btn:hover { opacity: .9; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; opacity: 1; }
        .btn-danger  { background: #ef4444; color: #fff; }
        .btn-danger:hover  { background: #dc2626; opacity: 1; }
        .btn-small { padding: .3rem .6rem; font-size: .75rem; }

        /* ── Tables ── */
        table { width: 100%; border-collapse: collapse; font-size: .875rem; }
        thead th {
            text-align: left; padding: .75rem 1rem; border-bottom: 2px solid #e2e8f0;
            font-weight: 600; color: #475569; font-size: .75rem; text-transform: uppercase; letter-spacing: .04em;
        }
        tbody td { padding: .75rem 1rem; border-bottom: 1px solid #f1f5f9; }
        tbody tr:nth-child(even) { background: #f8fafc; }
        tbody tr:hover { background: #f1f5f9; }

        /* ── Alert boxes ── */
        .alert-box {
            padding: 1rem 1.25rem; border-radius: .375rem; font-size: .875rem;
            margin-bottom: 1rem; border-left: 4px solid;
        }
        .alert-success { background: #f0fdf4; border-color: #22c55e; color: #166534; }
        .alert-error   { background: #fef2f2; border-color: #ef4444; color: #991b1b; }
        .alert-info    { background: #eff6ff; border-color: #3b82f6; color: #1e40af; }

        /* ── Forms ── */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: .8125rem; font-weight: 600; color: #374151; margin-bottom: .35rem; }
        input, select, textarea {
            width: 100%; padding: .5rem .75rem; font-size: .875rem; border: 1px solid #d1d5db;
            border-radius: .375rem; background: #fff; color: #1e293b; transition: border-color .15s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
        textarea { resize: vertical; min-height: 5rem; }

        /* ── Info tooltips ── */
        .info-tooltip-trigger {
            position: relative; display: inline-flex; cursor: help;
        }
        .info-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 1rem; height: 1rem; border-radius: 50%; background: #94a3b8; color: #fff;
            font-size: .6rem; font-weight: 700; font-style: italic; font-family: Georgia, serif;
            line-height: 1; flex-shrink: 0;
        }
        .info-tooltip-bubble {
            display: none; position: absolute; bottom: calc(100% + .5rem); left: 50%;
            transform: translateX(-50%); width: 280px; padding: .75rem; border-radius: .375rem;
            background: #1e293b; color: #e2e8f0; font-size: .75rem; font-weight: 400;
            font-style: normal; line-height: 1.5; box-shadow: 0 4px 12px rgba(0,0,0,.2);
            z-index: 200; pointer-events: none;
        }
        .info-tooltip-bubble::after {
            content: ''; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%); border: 6px solid transparent;
            border-top-color: #1e293b;
        }
        .info-tooltip-bubble a { color: #93c5fd; }
        .info-tooltip-trigger:hover .info-tooltip-bubble,
        .info-tooltip-trigger:focus .info-tooltip-bubble {
            display: block; pointer-events: auto;
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; flex-direction: row; flex-wrap: wrap; }
            .sidebar-brand { border-bottom: none; padding: 1rem; }
            .sidebar-nav { display: flex; flex-wrap: wrap; padding: 0 .5rem .5rem; }
            .sidebar-nav li a { padding: .5rem .75rem; font-size: .8125rem; }
            .main { margin-left: 0; }
            .content { padding: 1rem; }
            .stats-grid { grid-template-columns: 1fr; }
            body { flex-direction: column; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">Hotel Tracker</div>
    <ul class="sidebar-nav">
        <li><a href="/"><span class="icon">&#9632;</span> Dashboard</a></li>
        <li><a href="/hotels"><span class="icon">&#9962;</span> Hotels</a></li>
        <li><a href="/bookings"><span class="icon">&#9993;</span> Bookings</a></li>
        <li><a href="/snapshots"><span class="icon">&#128247;</span> Snapshots</a></li>
        <li><a href="/alerts"><span class="icon">&#128276;</span> Alerts</a></li>
        <li><a href="/trends"><span class="icon">&#128200;</span> Trends</a></li>
        <li><a href="/import"><span class="icon">&#8593;</span> Import</a></li>
        <li><a href="/scrape"><span class="icon">&#8635;</span> Scrape</a></li>
        <li><a href="/scrapes"><span class="icon">&#128218;</span> Scrape Runs</a></li>
        <li><a href="/check"><span class="icon">&#10003;</span> Check</a></li>
        <li><a href="/scheduler" style="color:#f59e0b;"><span class="icon">&#9200;</span> Scheduler</a></li>
        <li><a href="/config"><span class="icon">&#9881;</span> Config</a></li>
    </ul>
</aside>

<div class="main">
    <header class="topbar">
        <h1>{% block topbar_title %}Dashboard{% endblock %}</h1>
    </header>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
